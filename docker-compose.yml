services:
  writers-guild:
    build: .
    container_name: writers-guild-server
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - ./server/config.yaml:/app/config.yaml
    environment:
      - NODE_ENV=production
      # HTTP Basic Authentication: set BASIC_AUTH_USERNAME and BASIC_AUTH_PASSWORD
      # in a .env file next to this compose file (see .env.example). Auth is
      # disabled when either is empty.
      - BASIC_AUTH_USERNAME=${BASIC_AUTH_USERNAME:-}
      - BASIC_AUTH_PASSWORD=${BASIC_AUTH_PASSWORD:-}
    restart: unless-stopped
    networks:
      - proxy-network

networks:
  proxy-network:
    external: true