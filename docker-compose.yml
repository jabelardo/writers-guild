services:
  writers-guild:
    build: .
    container_name: writers-guild-server
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - ./server/config.yaml:/app/config.yaml
    environment:
      - NODE_ENV=production
      # Optional: Uncomment to enable HTTP Basic Authentication
      # - BASIC_AUTH_USERNAME=admin
      # - BASIC_AUTH_PASSWORD=changeme
    restart: unless-stopped
    networks:
      - proxy-network

networks:
  proxy-network:
    external: true